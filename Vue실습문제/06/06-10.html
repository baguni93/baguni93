<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .score {
        border: solid 1px black;
      }
      .warning {
        background-color: skyblue;
        color: purple;
      }
      .warnimage {
        width: 18px;
        height: 18px;
        top: 5px;
        position: relative;
      }
    </style>
  </head>
  <body>
    <div id="app">
      1부터 100까지만 입력가능합니다. <br />
      <div>
        점수 :
        <input type="text" class="score" v-model.number="num" :class="info" />
        <img
          v-if="info.warning"
          class="warnimage"
          src="https://contactsvc.bmaster.kro.kr/img/error.png"
          alt=""
        />
      </div>
    </div>

    <script src="https://unpkg.com/vue"></script>
    <script>
      let vm = Vue.createApp({
        name: 'App',
        data() {
          return { num: 50 };
        },
        computed: {
          info() {
            return { warning: this.num < 1 || this.num > 100 };
          },
        },
      }).mount('#app');
    </script>
  </body>
</html>
