<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .color {
        background-color: aqua;
        color: black;
      }
      .align {
        text-align: center;
        width: 120px;
      }
      .border {
        border: khaki dashed 1px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <input type="checkbox" v-model="btnStyle.color" />색상 <br />
      <input type="checkbox" v-model="btnStyle.align" />정렬, 크기 <br />
      <input type="checkbox" v-model="btnStyle.border" />테두리 <br />
      <button :class="btnStyle">버튼</button>
    </div>
    <script src="https://unpkg.com/vue"></script>
    <script>
      let vm = Vue.createApp({
        name: 'App',
        data() {
          return {
            btnStyle: {
              color: false,
              align: false,
              border: false,
            },
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
