<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      #list {
        width: 600px;
        border: 1px solid black;
        border-collapse: collapse;
      }
      #list td,
      #list th {
        border: 1px solid black;
        text-align: center;
      }
      #list > thead > tr {
        color: yellow;
        background-color: purple;
      }
      .divider {
        height: 2px;
        background-color: gray;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <table id="list">
        <thead>
          <tr>
            <th>번호</th>
            <th>이름</th>
            <th>전화번호</th>
          </tr>
        </thead>
        <tbody id="contacts">
          <template v-for="(contact,index) in contacts" :key="contact.no">
            <tr>
              <td>{{contact.no}}</td>
              <td>{{contact.name}}</td>
              <td>{{contact.tel}}</td>
            </tr>
            <tr class="divider" v-if="index %4 ===3">
              <td colspan="3"></td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>

    <script src="https://unpkg.com/vue"></script>
    <script>
      let vm = Vue.createApp({
        name: 'App',
        data() {
          return {
            contacts: [
              { no: 1011, name: 'rm', tel: '010' },
              { no: 1012, name: 'rm', tel: '010' },
              { no: 1013, name: 'rm', tel: '010' },
              { no: 1014, name: 'rm', tel: '010' },
              { no: 1015, name: 'rm', tel: '010' },
              { no: 1016, name: 'rm', tel: '010' },
              { no: 1017, name: 'rm', tel: '010' },
              { no: 1018, name: 'rm', tel: '010' },
            ],
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
